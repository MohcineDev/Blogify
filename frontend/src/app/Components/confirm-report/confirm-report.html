@if(displayConfirm.reportProfile || displayConfirm.reportPost){

<div (click)="hideConfirm($event)" class="overlay">

    <div class="report-container">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="#e47289" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 3v1.5M3 21v-6m0 0 2.77-.693a9 9 0 0 1 6.208.682l.108.054a9 9 0 0 0 6.086.71l3.114-.732a48.524 48.524 0 0 1-.005-10.499l-3.11.732a9 9 0 0 1-6.085-.711l-.108-.054a9 9 0 0 0-6.208-.682L3 4.5M3 15V4.5" />
                    </svg>
        <h2>Report this {{displayConfirm.reportProfile ? 'user' : 'post'}}</h2>
        <input class="input-field" [(ngModel)]="displayConfirm.reason" required placeholder="reason" type="text">
        <div>
            <button (click)="hideConfirm($event)" class="cancel">cancel</button>
            <button (click)="submitReport($event)" class="submit">submit</button>
        </div>
        <p class="error-message">{{errMsg}}</p>
    </div>
</div>
}
